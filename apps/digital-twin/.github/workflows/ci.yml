name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run tests
        run: pnpm vitest run --passWithNoTests

      - name: Build
        run: pnpm build

  staging-migration:
    name: Push Schema to Staging DB
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Diagnostic connection test
        run: |
          npx tsx -e "
          import postgres from 'postgres';
          (async () => {
            const sql = postgres(process.env.STAGING_DATABASE_URL, { ssl: { rejectUnauthorized: false } });
            try {
              const result = await sql\`SELECT current_database(), current_user, version()\`;
              console.log('Connected:', JSON.stringify(result[0]));
            } catch (e) {
              console.error('Connection failed:', e.message);
              process.exit(1);
            } finally {
              await sql.end();
            }
          })();
          "
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Push schema to staging
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
